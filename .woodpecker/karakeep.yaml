# Karakeep fork image.
# Pushes the Postgres-only all-in-one runtime to: ghcr.io/yaelmoshi/karakeep
when:
  - event: manual
  - event: pull_request
  - event: push
    branch: main

steps:
  - name: preflight
    when:
      - event: manual
      - event: pull_request
    image: dhi.io/node:26.3.0-debian13-dev
    environment:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      PNPM_STORE_DIR: /pnpm/store
      CI: "true"
      NPM_CONFIG_CONFIRM_MODULES_PURGE: "false"
      # Keep default pnpm minimumReleaseAge for normal installs, but force deterministic CI preflight.
      NPM_CONFIG_MINIMUM_RELEASE_AGE: "0"
      TURBO_CACHE_DIR: /tmp/karakeep-turbo
      TURBO_TELEMETRY_DISABLED: "1"
    commands:
      - mkdir -p /tmp/karakeep-ci "$TURBO_CACHE_DIR"
      - tar --exclude=.git --exclude=node_modules --exclude=.turbo -cf - . | tar -C /tmp/karakeep-ci -xf -
      - cd /tmp/karakeep-ci
      - npm install -g corepack@0.31.0 && corepack enable
      - pnpm config set store-dir "$PNPM_STORE_DIR"
      - pnpm install --frozen-lockfile --prefer-offline --ignore-scripts --config.minimumReleaseAge="$NPM_CONFIG_MINIMUM_RELEASE_AGE"
      - pnpm --config.minimumReleaseAge="$NPM_CONFIG_MINIMUM_RELEASE_AGE" exec turbo run --no-daemon --concurrency=1 typecheck lint format

  - name: build-and-push-ghcr
    when:
      - event: manual
      - event: push
        branch: main
    image: woodpeckerci/plugin-docker-buildx:6.1.0@sha256:33263f74a593ddef5d4faeb39ae9f87db14d64d8aae8186284ae6e90d89298a4
    privileged: true
    settings:
      registry: ghcr.io
      repo: ghcr.io/yaelmoshi/karakeep
      dockerfile: docker/Dockerfile
      context: .
      target: aio-postgres
      tags:
        - "${CI_COMMIT_SHA:0:8}"
        - latest
      logins:
        - registry: ghcr.io
          username: yaelmoshi
          password:
            from_secret: github_token
        - registry: dhi.io
          username:
            from_secret: dhi_username
          password:
            from_secret: dhi_token
      provenance: mode=max
      buildkit_driveropt: network=host
      cache_from: 'type=registry\,ref=ghcr.io/yaelmoshi/karakeep:buildcache'
      cache_to: 'type=registry,ref=ghcr.io/yaelmoshi/karakeep:buildcache,mode=max,ignore-error=true'

  - name: trivy-scan
    when:
      - event: manual
      - event: push
        branch: main
    failure: ignore
    image: dhi.io/trivy:0.71.0-alpine3.23-dev@sha256:9c2cbe50ca483369406b10013f9da47664a5b471c5eb0928437c463e7c2ff2b0
    environment:
      IMAGE_REF: ghcr.io/yaelmoshi/karakeep:${CI_COMMIT_SHA:0:8}
    commands:
      - trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed $${IMAGE_REF}
      - trivy image --exit-code 0 --severity HIGH --ignore-unfixed $${IMAGE_REF}

  - name: sbom-generate
    when:
      - event: manual
      - event: push
        branch: main
    failure: ignore
    image: dhi.io/syft:1.45.1-alpine3.23-dev@sha256:15555e3a8638a080c9c697f75ed5111d3061198f6de47b8464f953c5edc1046d
    environment:
      IMAGE_REF: ghcr.io/yaelmoshi/karakeep:${CI_COMMIT_SHA:0:8}
    commands:
      - syft registry:$${IMAGE_REF} -o spdx-json > sbom.spdx.json
