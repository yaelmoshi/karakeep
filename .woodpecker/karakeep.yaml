# Karakeep fork image.
# Pushes the Postgres-only all-in-one runtime to: ghcr.io/yaelmoshi/karakeep
when:
  - event: manual
  - event: pull_request
  - event: push
    branch: main

steps:
  - name: preflight
    when:
      - event: manual
      - event: pull_request
    image: harbor.m0sh1.cc/apps/karakeep-node-ci-deps:ed310d1b@sha256:3b112e55dedc6b021dc8be1dfa25d6f77d95c981c0ee003f1fdc82901c3b3c8a
    environment:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      PNPM_STORE_DIR: /pnpm/store
      TURBO_CACHE_DIR: /tmp/karakeep-turbo
      TURBO_TELEMETRY_DISABLED: "1"
    commands:
      - mkdir -p /tmp/karakeep-ci "$TURBO_CACHE_DIR"
      - tar --exclude=.git --exclude=node_modules --exclude=.turbo -cf - . | tar -C /tmp/karakeep-ci -xf -
      - cd /tmp/karakeep-ci
      - pnpm config set store-dir "$PNPM_STORE_DIR"
      - pnpm install --frozen-lockfile --prefer-offline --ignore-scripts
      - pnpm exec turbo run --no-daemon --concurrency=1 typecheck lint format

  - name: build-and-push-ghcr
    when:
      - event: manual
      - event: push
        branch: main
    image: woodpeckerci/plugin-docker-buildx:6.1.0@sha256:33263f74a593ddef5d4faeb39ae9f87db14d64d8aae8186284ae6e90d89298a4
    privileged: true
    settings:
      registry: ghcr.io
      repo: ghcr.io/yaelmoshi/karakeep
      dockerfile: docker/Dockerfile
      context: .
      target: aio-postgres
      tags:
        - "${CI_COMMIT_SHA:0:8}"
        - latest
      logins:
        - registry: ghcr.io
          username: yaelmoshi
          password:
            from_secret: github_token
        - registry: dhi.io
          username:
            from_secret: dhi_username
          password:
            from_secret: dhi_token
      provenance: mode=max
      buildkit_driveropt: network=host
      cache_from: 'type=registry\,ref=ghcr.io/yaelmoshi/karakeep:buildcache'
      cache_to: 'type=registry,ref=ghcr.io/yaelmoshi/karakeep:buildcache,mode=max,ignore-error=true'

  - name: trivy-scan
    when:
      - event: manual
      - event: push
        branch: main
    failure: ignore
    image: dhi.io/trivy:0.70.0-alpine3.23-dev@sha256:caefdb66517f23ffb0b0ccefd6a4c4f8cc64a73766cd63ffee72e6c759f89952
    environment:
      IMAGE_REF: ghcr.io/yaelmoshi/karakeep:${CI_COMMIT_SHA:0:8}
    commands:
      - trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed $${IMAGE_REF}
      - trivy image --exit-code 0 --severity HIGH --ignore-unfixed $${IMAGE_REF}

  - name: sbom-generate
    when:
      - event: manual
      - event: push
        branch: main
    failure: ignore
    image: dhi.io/syft:1.44.0-alpine3.23-dev@sha256:1384fcbb9daba2b46e190aa1a090129c63234a5bd3aabc0b97f514fe7abca678
    environment:
      IMAGE_REF: ghcr.io/yaelmoshi/karakeep:${CI_COMMIT_SHA:0:8}
    commands:
      - syft registry:$${IMAGE_REF} -o spdx-json > sbom.spdx.json
