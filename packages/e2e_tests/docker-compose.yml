services:
  web:
    build:
      dockerfile: docker/Dockerfile
      context: ../../
      target: aio
    restart: unless-stopped
    ports:
      - "${KARAKEEP_PORT:-3000}:3000"
    environment:
      DATA_DIR: /tmp
      NEXTAUTH_SECRET: secret
      NEXTAUTH_URL: http://localhost:${KARAKEEP_PORT:-3000}
      MEILI_MASTER_KEY: dummy
      MEILI_ADDR: http://meilisearch:7700
      BROWSER_WEB_URL: http://chrome:9222
      CRAWLER_NUM_WORKERS: 6
      CRAWLER_ALLOWED_INTERNAL_HOSTNAMES: nginx
      CRAWLER_VIDEO_DOWNLOAD: "true"
      CRAWLER_VIDEO_DOWNLOAD_MAX_SIZE: -1
      OPENAI_API_KEY: aimock-test-key
      OPENAI_BASE_URL: http://aimock:4010/v1
      INFERENCE_ENABLE_AUTO_SUMMARIZATION: "true"
  meilisearch:
    image: getmeili/meilisearch:v1.44.0
    restart: unless-stopped
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: dummy
  chrome:
    image: gcr.io/zenika-hub/alpine-chrome:124
    restart: unless-stopped
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./setup/html:/usr/share/nginx/html
      - ./setup/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
  aimock:
    image: ghcr.io/copilotkit/aimock:latest
    restart: unless-stopped
    ports:
      - "${AIMOCK_PORT:-4010}:4010"
    volumes:
      - ./setup/aimock:/fixtures:ro
    command:
      - --fixtures
      - /fixtures
      - --host
      - 0.0.0.0
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - http://127.0.0.1:4010/health
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  minio_data:
